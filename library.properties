name=UngulaNet
version=1.0.2
author=Alex Conesa <alexconesap@gmail.com>
maintainer=Alex Conesa <alexconesap@gmail.com>
sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: networking stack (WiFi AP/STA, ESP-NOW, HTTP server + WebSocket, HTTPS client, NTP).
paragraph=Embedded C++17 networking on top of ESP-IDF — no Arduino WiFi dependency. WiFi AP, STA and AP+STA modes. ESP-NOW transport with a pairing FSM. Unified HTTP + WebSocket server on one port. HTTP client with HTTPS (mbedTLS cert bundle). NTP time sync. Transport-agnostic connection manager. Supported targets: ESP32 only — the networking stack is ESP-IDF specific; STM32 and other MCUs are not supported.
category=Communication
url=https://github.com/alexconesap/ungula-net.git
includes=ungula_net.h
depends=UngulaCore,EmblogX
architectures=esp32
